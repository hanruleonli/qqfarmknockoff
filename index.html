<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>QQ Farm</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<audio id="bgMusic" src="music.mp3" loop></audio>

<button id="playMusicBtn">Play Music</button>
<div id="notice" class="notice"></div>
<div class="shell">
  <div class="header">
    <div id="titleTxt" class="brand">🌱 QQ农场</div>
    <button id="playerBtn" class="player-chip" title="switch player">
      <span id="hdrAvatar">🌾</span>
      <span id="hdrName">Guest</span>
      <span id="hdrLevel">Lv.1</span>
    </button>
    <div class="gold-chip">🪙 <span id="hdrGold">0</span></div>
    <div class="actions">
      <button id="tabMine" class="btn active"></button>
      <button id="tabVisit" class="btn"></button>
      <button id="btBtn" class="btn bluetooth"></button>
      <button id="adminBtn" class="btn admin"></button>
      <button id="logoutBtn" class="btn"></button>
      <div id="langs" class="langs"></div>
    </div>
  </div>

  <div class="main">
    <div class="panel farm">
      <div class="farm-head">
        <div class="farm-meta">
          <div id="farmTitle" class="farm-title"></div>
        </div>
        <div id="weather" class="weather"></div>
      </div>
      <div id="battleBar" class="battle-bar hidden"></div>
      <div id="toolbar" class="toolbar"></div>
      <div class="farm-body">
        <div class="leader-panel">
          <div id="topUsersLabel" class="leaderboard-label"></div>
          <div id="topUsers" class="leaderboard"></div>
        </div>
        <div class="grid-wrap">
          <div id="selector" class="selector"></div>
          <div id="grid" class="grid"></div>
        </div>
      </div>
    </div>

    <div class="panel side">
      <div class="card">
        <h3 id="shopTitle"></h3>
        <div id="shop" class="shop"></div>
      </div>
      <div class="card">
        <h3 id="friendsTitle"></h3>
        <div id="friends" class="list"></div>
        <button id="addBtn" class="btn" style="width:100%;margin-top:8px"></button>
      </div>
      <div class="card">
        <h3 id="logTitle"></h3>
        <div id="controlHint" style="font-size:11px;opacity:.86;margin-bottom:8px"></div>
        <div id="log" class="list"></div>
      </div>
    </div>
  </div>
</div>

<div id="pad" class="pad">
  <div class="pad-inner">
    <button class="pad-btn" data-act="left">◀</button>
    <button class="pad-btn" data-act="up">▲</button>
    <button class="pad-btn" data-act="action">A</button>
    <button class="pad-btn" data-act="down">▼</button>
    <button class="pad-btn" data-act="right">▶</button>
  </div>
</div>

<div id="switchModal" class="overlay">
  <div class="modal">
    <h2 id="switchTitle"></h2>
    <div id="switchList" class="list"></div>
    <div class="modal-actions"><button id="switchClose" class="btn"></button></div>
  </div>
</div>

<div id="addModal" class="overlay">
  <div class="modal">
    <h2 id="addTitle"></h2>
    <input id="newName" maxlength="10">
    <input id="newLocation" maxlength="24">
    <input id="newPassword" type="password" autocomplete="off">
    <select id="newAvatar"></select>
    <div class="modal-actions">
      <button id="addCancel" class="btn"></button>
      <button id="addConfirm" class="btn active"></button>
    </div>
  </div>
</div>

<div id="loginModal" class="overlay">
  <div class="modal">
    <h2 id="loginTitle"></h2>
    <select id="loginPlayer"></select>
    <input id="loginPassword" type="password" autocomplete="off">
    <div class="modal-actions">
      <button id="loginCreate" class="btn"></button>
      <button id="loginSubmit" class="btn active"></button>
    </div>
  </div>
</div>

<div id="adminModal" class="overlay">
  <div class="modal">
    <h2 id="adminTitle"></h2>
    <div class="admin-grid">
      <label id="adminPendingLabel"></label>
      <div id="adminPendingList" class="list"></div>
      <label id="adminPlayerLabel" for="adminPlayer"></label>
      <select id="adminPlayer"></select>
      <div class="admin-row">
        <div>
          <label id="adminGoldLabel" for="adminGold"></label>
          <input id="adminGold" type="number" step="1">
        </div>
        <div>
          <label id="adminXpLabel" for="adminXp"></label>
          <input id="adminXp" type="number" step="1">
        </div>
      </div>
      <div class="admin-row">
        <button id="adminApplyStats" class="btn active"></button>
        <button id="adminGiveBoost" class="btn"></button>
      </div>
      <div class="admin-row">
        <button id="adminFillReady" class="btn"></button>
        <button id="adminClearPlots" class="btn"></button>
      </div>
      <div class="admin-row">
        <button id="adminWeatherSunny" class="btn"></button>
        <button id="adminWeatherRain" class="btn"></button>
      </div>
      <div class="admin-row">
        <button id="adminWeatherHeat" class="btn"></button>
        <button id="adminWeatherCold" class="btn"></button>
      </div>
      <div style="height:6px"></div>
      <label id="adminCloudTitle"></label>
      <input id="adminCloudUrl">
      <div class="admin-row">
        <input id="adminCloudGameId">
        <input id="adminCloudToken">
      </div>
      <button id="adminCloudSave" class="btn active"></button>
      <div class="admin-row">
        <button id="adminCloudSaveAction" class="btn cloud"></button>
        <button id="adminCloudLoadAction" class="btn cloud"></button>
      </div>
      <button id="adminCloudTestAction" class="btn cloud"></button>
    </div>
    <div class="modal-actions">
      <button id="adminClose" class="btn"></button>
    </div>
  </div>
</div>

<div id="adminAuthModal" class="overlay">
  <div class="modal">
    <h2 id="adminAuthTitle"></h2>
    <div id="adminAuthHint" style="font-size:12px;opacity:.9;margin-bottom:6px"></div>
    <input id="adminToken" type="password" autocomplete="off">
    <input id="adminTokenConfirm" type="password" autocomplete="off" class="hidden">
    <div class="modal-actions">
      <button id="adminAuthCancel" class="btn"></button>
      <button id="adminAuthSetup" class="btn active hidden"></button>
      <button id="adminAuthUnlock" class="btn active"></button>
    </div>
  </div>
</div>

<div id="userAuthModal" class="overlay">
  <div class="modal">
    <h2 id="userAuthTitle"></h2>
    <div id="userAuthHint" style="font-size:12px;opacity:.9;margin-bottom:6px"></div>
    <input id="userToken" type="password" autocomplete="off">
    <input id="userTokenConfirm" type="password" autocomplete="off" class="hidden">
    <div class="modal-actions">
      <button id="userAuthCancel" class="btn"></button>
      <button id="userAuthSetup" class="btn active hidden"></button>
      <button id="userAuthUnlock" class="btn active"></button>
    </div>
  </div>
</div>

<div id="battleModal" class="overlay">
  <div class="modal battle-modal">
    <h2 id="battleTitle"></h2>
    <div id="battleSubtitle" class="battle-subtitle"></div>
    <div id="battleInstructions" class="battle-instructions"></div>
    <div class="battle-stats">
      <div><span id="battleTimeLabel"></span>: <span id="battleTimer">0.0s</span></div>
      <div><span id="battleMistakesLabel"></span>: <span id="battleMistakes">0</span></div>
    </div>
    <div id="battleGrid" class="battle-grid"></div>
    <div class="modal-actions">
      <button id="battleGiveUp" class="btn"></button>
    </div>
  </div>
</div>

<!-- SLOT MACHINE (uses in-game gold, integrated with player state) -->
<button id="slotButton" class="slot-fab" title="Slot Machine (Press 0)">🎰</button>

<div id="slotOverlay" class="overlay">
  <div class="modal slot-modal">
    <div class="slot-modal-head">
      <h2>🎰 Lucky Harvest Slots</h2>
      <button id="slotCloseX" class="slot-close" aria-label="Close">✕</button>
    </div>
    <div class="slot-balance">🪙 <span id="slotGoldDisplay">0</span></div>
    <div class="slots">
      <div class="reel" id="r1">❔</div>
      <div class="reel" id="r2">❔</div>
      <div class="reel" id="r3">❔</div>
    </div>
    <div id="slotText" class="slot-text">Match all 3 reels to win. Good luck!</div>
    <div id="slotPaytable" class="slot-paytable"></div>
    <div class="slot-actions">
      <button id="spinBtn" class="btn slot-spin">SPIN (50 🪙)</button>
      <button id="slotCloseBtn" class="btn">CLOSE</button>
    </div>
  </div>
</div>

  <script src="scripts.js" defer></script>
</body>
</html>
